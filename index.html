<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewCal — Airline Schedule Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --card: #161a22;
    --border: #1e2330;
    --accent: #e8c84a;
    --accent2: #4a8fe8;
    --green: #4ae8a0;
    --red: #e84a6a;
    --text: #e8eaf0;
    --muted: #5a6070;
    --off-bg: #0e1016;
    --off-border: #181c24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(232,200,74,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(232,200,74,0.02) 1px,transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }

  /* ═══════════════════════════════
     PASTE SCREEN
  ═══════════════════════════════ */
  #paste-screen {
    position:relative; z-index:1; min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px;
  }
  .brand {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,96px);
    letter-spacing:0.06em; line-height:1; margin-bottom:6px;
    background:linear-gradient(135deg,var(--accent),#f0a030);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .brand-sub {
    font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.2em;
    color:var(--muted); text-transform:uppercase; margin-bottom:48px; text-align:center;
  }
  .paste-card {
    width:100%; max-width:680px; background:rgba(22,26,34,0.8);
    border:1px solid var(--border); border-radius:16px; padding:32px; position:relative;
  }
  .paste-card label {
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.16em;
    text-transform:uppercase; color:var(--muted); display:block; margin-bottom:12px;
  }
  .paste-card label span {
    color:var(--accent); margin-left:6px;
  }
  textarea {
    width:100%; height:220px; background:#0c0e14; border:1px solid var(--border);
    border-radius:8px; color:var(--text); font-family:'DM Mono',monospace; font-size:11px;
    line-height:1.6; padding:14px; resize:vertical; outline:none;
    transition:border-color 0.2s; letter-spacing:0.02em;
  }
  textarea:focus { border-color:rgba(232,200,74,0.4); }
  textarea::placeholder { color:#2a3040; }
  .paste-actions { display:flex; gap:12px; margin-top:16px; align-items:center; flex-wrap:wrap; }
  .btn-primary {
    font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.1em;
    background:var(--accent); color:#0a0c10; border:none; border-radius:8px;
    padding:10px 32px; cursor:pointer; transition:all 0.2s; flex-shrink:0;
  }
  .btn-primary:hover { background:#f0d060; transform:translateY(-1px); }
  .btn-primary:active { transform:translateY(0); }
  .paste-hint {
    font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
    letter-spacing:0.06em; line-height:1.6;
  }

  .how-to {
    width:100%; max-width:680px; margin-top:28px;
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  }
  .how-step {
    background:rgba(22,26,34,0.5); border:1px solid var(--border); border-radius:10px;
    padding:16px; text-align:center;
  }
  .how-num {
    font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--accent);
    line-height:1; margin-bottom:6px;
  }
  .how-text {
    font-family:'DM Mono',monospace; font-size:10px; color:var(--muted);
    letter-spacing:0.06em; line-height:1.5;
  }

  #error-msg {
    display:none; margin-top:16px; background:rgba(232,74,106,0.1);
    border:1px solid rgba(232,74,106,0.3); border-radius:8px; padding:12px 16px;
    font-family:'DM Mono',monospace; font-size:11px; color:var(--red); letter-spacing:0.06em;
  }
  #error-msg.show { display:block; }

  /* ═══════════════════════════════
     CALENDAR SCREEN
  ═══════════════════════════════ */
  #cal-screen { display:none; position:relative; z-index:1; padding:32px 20px 60px; }
  #cal-screen.show { display:block; }
  .page-wrap { max-width:1140px; margin:0 auto; }

  .top-nav {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:32px; flex-wrap:wrap; gap:12px;
  }
  .nav-brand { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.1em; color:var(--accent); opacity:0.7; }
  .btn-back {
    font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--muted); background:transparent;
    border:1px solid var(--border); border-radius:6px; padding:8px 16px;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-back:hover { border-color:var(--accent); color:var(--accent); }

  /* header */
  .cal-header {
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border);
    flex-wrap:wrap; gap:20px;
  }
  .tag { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .tag::before { content:''; display:inline-block; width:20px; height:1px; background:var(--accent); }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(44px,6vw,76px); letter-spacing:0.04em; line-height:0.9; }
  h1 span { color:var(--accent); }
  .sub { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); margin-top:8px; letter-spacing:0.08em; }
  .stats { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-end; }
  .stat { text-align:right; }
  .stat-l { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .stat-v { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:var(--accent); }
  .stat-v.holiday { color:var(--green); }

  /* legend */
  .legend { display:flex; gap:18px; margin-bottom:24px; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:0.05em; }
  .leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

  /* dow */
  .dow-row { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:3px; }
  .dow { text-align:center; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); padding:8px 0; }

  /* ═══════════════════════════════
     CALENDAR CELLS
  ═══════════════════════════════ */
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }

  .dc {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    min-height:112px; padding:9px 9px 7px; position:relative; overflow:visible;
    transition:border-color 0.18s, transform 0.15s;
  }
  .dc:hover { border-color:#3a4050; transform:translateY(-1px); z-index:50; }
  .dc.empty { background:transparent; border-color:transparent; min-height:0; }
  .dc.empty:hover { transform:none; border-color:transparent; }

  .dc.off { background:var(--off-bg); border-color:var(--off-border); }
  .dc.off .dn { color:#2e3440; }

  /* holiday ring on off days */
  .dc.holiday-off { box-shadow:inset 0 0 0 1px rgba(232,200,74,0.15); }

  .dc.pstart { background:linear-gradient(160deg,#161a22,#191e2a); border-color:rgba(232,200,74,0.3); }
  .dc.pstart::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent); border-radius:8px 8px 0 0; }

  .dc.pcont { background:linear-gradient(160deg,#161a22,#151d2a); border-color:rgba(74,143,232,0.3); }
  .dc.pcont::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent2); border-radius:8px 8px 0 0; }

  /* holiday worked — green accent dot in corner */
  .dc.holiday-worked::after {
    content:'★'; position:absolute; top:6px; right:8px;
    font-size:8px; color:var(--green); opacity:0.8;
  }

  .dc.prior { background:#0c0e14; border:1px dashed #252a36; opacity:0.65; }
  .dc.prior::before { display:none; }

  .dn { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:5px; }
  .dc.pstart .dn, .dc.pcont .dn { color:var(--text); }
  .dc.prior .dn { color:#3a4050; }

  .off-lbl { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#2a3040; }
  .holiday-lbl { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(232,200,74,0.4); margin-top:3px; display:block; }
  .prior-stamp { display:inline-block; font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:#3a4a5a; background:rgba(74,143,232,0.06); border:1px solid rgba(74,143,232,0.12); border-radius:3px; padding:1px 5px; margin-bottom:4px; }

  .pcode { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:0.04em; color:var(--accent); line-height:1; margin-bottom:3px; }
  .pcode.cont { color:var(--accent2); font-size:16px; }
  .pcode.prior-c { color:#3a6070; font-size:16px; }

  .trow { display:flex; justify-content:space-between; }
  .tv { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
  .tv.rpt { color:rgba(232,200,74,0.75); }
  .tv.rel { color:rgba(74,143,232,0.85); }
  .tv.rel-prior { color:rgba(74,143,232,0.45); }

  .lbadge { display:inline-flex; align-items:center; gap:3px; background:rgba(74,143,232,0.1); border:1px solid rgba(74,143,232,0.2); border-radius:4px; padding:2px 6px; margin-top:5px; font-family:'DM Mono',monospace; font-size:10px; font-weight:500; color:var(--accent2); letter-spacing:0.08em; }
  .cred { font-family:'DM Mono',monospace; font-size:9px; color:var(--green); margin-top:4px; }

  /* ═══════════════════════════════
     HOVER TOOLTIP
  ═══════════════════════════════ */
  .tt {
    display:none; position:absolute; top:calc(100% + 8px); left:0;
    width:290px; background:#1a1f2e; border:1px solid #2a3040;
    border-radius:10px; padding:14px; z-index:999;
    box-shadow:0 20px 60px rgba(0,0,0,0.7); pointer-events:none;
  }
  .dc:nth-child(7n+5) .tt,
  .dc:nth-child(7n+6) .tt,
  .dc:nth-child(7n+0) .tt { left:auto; right:0; }
  .dc:hover .tt { display:block; }

  .tt-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #2a3040; }
  .tt-code { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--accent); letter-spacing:0.04em; line-height:1; }
  .tt-meta { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); text-align:right; line-height:1.5; }

  .tt-legs { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
  .tt-leg { display:flex; align-items:center; gap:4px; font-family:'DM Mono',monospace; font-size:10px; }
  .tt-fnum { color:var(--muted); font-size:9px; width:30px; }
  .tt-from { font-family:'Bebas Neue',sans-serif; font-size:13px; color:var(--text); letter-spacing:0.04em; }
  .tt-arrow { color:var(--muted); flex:1; text-align:center; font-size:9px; }
  .tt-to { font-family:'Bebas Neue',sans-serif; font-size:13px; color:var(--text); letter-spacing:0.04em; }
  .tt-dep { color:rgba(232,200,74,0.7); font-size:9px; width:34px; text-align:right; }
  .tt-arr { color:rgba(74,232,160,0.7); font-size:9px; width:34px; text-align:right; }

  .tt-div { border:none; border-top:1px solid #2a3040; margin:8px 0; }
  .tt-row { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:10px; padding:2px 0; }
  .tt-lbl { color:var(--muted); font-size:9px; letter-spacing:0.08em; text-transform:uppercase; }
  .tt-val { color:var(--text); }
  .tt-val.g { color:var(--accent); }
  .tt-val.b { color:var(--accent2); }
  .tt-val.gr { color:var(--green); }

  .tt-hotel { margin-top:8px; padding-top:8px; border-top:1px solid #2a3040; }
  .tt-hotel-name { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text); margin-bottom:2px; }
  .tt-hotel-ph { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent2); }

  .tt-holiday { margin-top:8px; padding-top:8px; border-top:1px solid #2a3040; font-family:'DM Mono',monospace; font-size:9px; color:var(--green); letter-spacing:0.08em; }

  /* ═══════════════════════════════
     PAIRING CARDS
  ═══════════════════════════════ */
  .summary { margin-top:44px; border-top:1px solid var(--border); padding-top:32px; }
  .summary h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.06em; margin-bottom:20px; }
  .pcards { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px; }
  .pcard { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 18px 16px; position:relative; overflow:hidden; }
  .pcard::before { content:''; position:absolute; top:0;left:0; width:3px; height:100%; background:var(--accent); }
  .pc-code { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.04em; color:var(--accent); line-height:1; }
  .pc-dates { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; margin-bottom:12px; }
  .route { display:flex; align-items:center; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .apt { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.06em; color:var(--text); }
  .rt-arr { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .pstats { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .ps { background:var(--surface); border-radius:6px; padding:7px 8px; }
  .ps-l { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2px; }
  .ps-v { font-family:'DM Mono',monospace; font-size:13px; color:var(--text); font-weight:500; }
  .pills { margin-top:10px; display:flex; gap:6px; flex-wrap:wrap; }
  .pill-lay { display:inline-flex; align-items:center; gap:4px; background:rgba(74,143,232,0.1); border:1px solid rgba(74,143,232,0.2); border-radius:20px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:11px; color:var(--accent2); }
  .pill-cr { display:inline-flex; align-items:center; gap:4px; background:rgba(74,232,160,0.08); border:1px solid rgba(74,232,160,0.15); border-radius:20px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:11px; color:var(--green); }
  .pill-hol { display:inline-flex; align-items:center; gap:4px; background:rgba(232,200,74,0.08); border:1px solid rgba(232,200,74,0.2); border-radius:20px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); }

  /* holiday summary section */
  .holiday-section { margin-top:32px; border-top:1px solid var(--border); padding-top:28px; }
  .holiday-section h2 { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:0.06em; margin-bottom:16px; color:var(--green); }
  .hol-cards { display:flex; gap:12px; flex-wrap:wrap; }
  .hol-card { background:rgba(74,232,160,0.05); border:1px solid rgba(74,232,160,0.15); border-radius:10px; padding:12px 16px; }
  .hol-name { font-family:'DM Mono',monospace; font-size:10px; color:var(--green); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px; }
  .hol-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .hol-bonus { font-family:'DM Mono',monospace; font-size:11px; color:var(--accent); margin-top:2px; }

  @media(max-width:640px){
    .dc { min-height:85px; padding:7px 6px; }
    .pcode { font-size:14px; }
    .tv { font-size:9px; }
    .lbadge { font-size:9px; }
    .how-to { grid-template-columns:1fr; }
    .tt { width:240px; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     PASTE SCREEN
═══════════════════════════════════════ -->
<div id="paste-screen">
  <div class="brand">CrewCal</div>
  <div class="brand-sub">Sabre CrewTrac Schedule Parser</div>

  <div class="paste-card">
    <label>Schedule Detail Report Text <span>— paste below</span></label>
    <textarea id="sched-input" placeholder="625778 SCHULZ,ZACHARY JOHN SEN# 02550 BID EWR EM7 FO&#10;PERIOD 0326 TIMES ARE IN LOCAL&#10;02 MAR OFF&#10;03 MAR OFF&#10;...&#10;09 MAR R7373 /0309 POS FO DAY 01 REPORT 1614&#10;3654 EWR SAV 1100 1330&#10;..."></textarea>
    <div class="paste-actions">
      <button class="btn-primary" onclick="handleParse()">BUILD CALENDAR</button>
      <div class="paste-hint">Paste the full text from your<br>Sabre Schedule Detail Report</div>
    </div>
    <div id="error-msg"></div>
  </div>

  <div class="how-to">
    <div class="how-step">
      <div class="how-num">1</div>
      <div class="how-text">Open Sabre CrewTrac<br>Schedule Detail Report</div>
    </div>
    <div class="how-step">
      <div class="how-num">2</div>
      <div class="how-text">Select All text<br>and Copy</div>
    </div>
    <div class="how-step">
      <div class="how-num">3</div>
      <div class="how-text">Paste here and hit<br>Build Calendar</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     CALENDAR SCREEN
═══════════════════════════════════════ -->
<div id="cal-screen">
  <div class="page-wrap">
    <div class="top-nav">
      <div class="nav-brand">CrewCal</div>
      <button class="btn-back" onclick="goBack()">← New Schedule</button>
    </div>
    <div id="cal-output"></div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════
const HOLIDAY_BONUS_MIN = 4 * 60 + 12; // 252 minutes per your contract

const MONTH_MAP = {
  JAN:0, FEB:1, MAR:2, APR:3, MAY:4, JUN:5,
  JUL:6, AUG:7, SEP:8, OCT:9, NOV:10, DEC:11
};
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
const MONTH_SHORT = ['JAN','FEB','MAR','APR','MAY','JUN',
                     'JUL','AUG','SEP','OCT','NOV','DEC'];

// ═══════════════════════════════════════
// HOLIDAY DETECTION (ported from your Python)
// ═══════════════════════════════════════
function easterDate(year) {
  const a = year % 19, b = Math.floor(year/100), c = year % 100;
  const d = Math.floor(b/4), e = b % 4, f = Math.floor((b+8)/25);
  const g = Math.floor((b-f+1)/3);
  const h = (19*a + b - d - g + 15) % 30;
  const i = Math.floor(c/4), k = c % 4;
  const l = (32 + 2*e + 2*i - h - k) % 7;
  const m = Math.floor((a + 11*h + 22*l) / 451);
  const month = Math.floor((h + l - 7*m + 114) / 31) - 1;
  const day = ((h + l - 7*m + 114) % 31) + 1;
  return new Date(year, month, day);
}

function superBowlSunday(year) {
  // Second Sunday of February
  let d = new Date(year, 1, 1);
  while (d.getDay() !== 0) d = new Date(d.getTime() + 86400000);
  return new Date(d.getTime() + 7*86400000);
}

function getHolidayName(dateObj) {
  const y = dateObj.getFullYear(), m = dateObj.getMonth(), d = dateObj.getDate();
  const dow = dateObj.getDay();

  // Fixed dates
  if (m===0 && d===1)  return "New Year's Day";
  if (m===6 && d===4)  return "Independence Day";
  if (m===11 && d===25) return "Christmas Day";

  // Memorial Day: last Monday of May
  if (m===4 && dow===1) {
    const next = new Date(y,4,d+7);
    if (next.getMonth() !== 4) return "Memorial Day";
  }

  // Labor Day: first Monday of September
  if (m===8 && dow===1 && d<=7) return "Labor Day";

  // Thanksgiving: 4th Thursday of November
  if (m===10 && dow===4) {
    const thursdays = [];
    for (let x=1; x<=30; x++) {
      if (new Date(y,10,x).getDay()===4) thursdays.push(x);
    }
    if (d === thursdays[3]) return "Thanksgiving";
  }

  // Easter
  const easter = easterDate(y);
  if (m===easter.getMonth() && d===easter.getDate()) return "Easter";

  // Super Bowl Sunday
  const sb = superBowlSunday(y);
  if (m===sb.getMonth() && d===sb.getDate()) return "Super Bowl Sunday";

  return null;
}

function isHoliday(dateObj) {
  return getHolidayName(dateObj) !== null;
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

// ═══════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════
function fmtTime(raw) {
  if (!raw) return '';
  const s = String(raw).padStart(4,'0');
  return `${s.slice(0,2)}:${s.slice(2)}`;
}

function fmtCredit(raw) {
  // "1822" → "18h22"
  if (!raw) return '';
  const s = String(raw).padStart(4,'0');
  return `${parseInt(s.slice(0,2))}h${s.slice(2)}`;
}

function minutesToHHMM(mins) {
  return `${Math.floor(mins/60)}h${String(mins%60).padStart(2,'0')}`;
}

function tcrdToMinutes(raw) {
  if (!raw) return 0;
  const s = String(raw).padStart(4,'0');
  return parseInt(s.slice(0,2))*60 + parseInt(s.slice(2));
}

// ═══════════════════════════════════════
// PARSER
// ═══════════════════════════════════════
function parseSchedule(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // ── Header info ──
  let empNum='', firstName='', lastName='', base='', position='', line24='';
  let bidMonthIdx=-1, bidYear=2026;

  // "625778 SCHULZ,ZACHARY JOHN SEN# 02550 BID EWR EM7 FO"
  for (const ln of lines) {
    const hm = ln.match(/^(\d{5,6})\s+([A-Z]+),([A-Z][A-Z\s]+?)\s+SEN#.*BID\s+([A-Z]{3})\s+(\S+)\s+(FO|CA|FA)/i);
    if (hm) {
      empNum=hm[1]; lastName=hm[2]; firstName=hm[3].trim();
      base=hm[4]; position=hm[6];
    }
    // "PERIOD 0326"
    const pm = ln.match(/PERIOD\s+(\d{2})(\d{2})/i);
    if (pm) { bidMonthIdx=parseInt(pm[1])-1; bidYear=2000+parseInt(pm[2]); }

    // Line number "Line: 24" (from grid view sometimes included)
    const lm = ln.match(/Line[:\s]+(\d+)/i);
    if (lm) line24 = lm[1];
  }

  // Fallback: infer month from first date found
  if (bidMonthIdx < 0) {
    for (const ln of lines) {
      const dm = ln.match(/^\d{2}\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\b/i);
      if (dm) { bidMonthIdx = MONTH_MAP[dm[1].toUpperCase()]; break; }
    }
  }
  if (bidMonthIdx < 0) throw new Error("Could not detect bid month. Make sure this is a Sabre Schedule Detail Report.");

  const daysInMonth = new Date(bidYear, bidMonthIdx+1, 0).getDate();
  const firstDOW = new Date(bidYear, bidMonthIdx, 1).getDay();

  // ── Group lines by date ──
  const dayBlocks = {}; // "YYYY-MM-DD" → [lines...]
  let curKey = null;

  for (const ln of lines) {
    const dm = ln.match(/^(\d{2})\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\s+(.*)/i);
    if (dm) {
      const dd = parseInt(dm[1]);
      const mo = MONTH_MAP[dm[2].toUpperCase()];
      // determine year: if month < bid month it's prev year bleed, if > it's next year
      let yr = bidYear;
      if (mo < bidMonthIdx && bidMonthIdx - mo > 6) yr = bidYear + 1;
      else if (mo > bidMonthIdx && mo - bidMonthIdx > 6) yr = bidYear - 1;
      curKey = dateKey(yr, mo, dd);
      if (!dayBlocks[curKey]) dayBlocks[curKey] = [];
      dayBlocks[curKey].push(dm[3].trim());
    } else if (curKey) {
      dayBlocks[curKey].push(ln);
    }
  }

  // ── Parse each day block ──
  const calDays = {};

  for (const [key, block] of Object.entries(dayBlocks)) {
    const first = block[0] || '';

    if (/^OFF$/i.test(first)) {
      calDays[key] = { type:'off' };
      continue;
    }

    // Pairing line: "R7373 /0309 POS FO DAY 01 REPORT 1614"
    const pm = first.match(/^(R\d+)\s+\/\d+\s+POS\s+\S+\s+DAY\s+(\d+)\s+REPORT\s+(\d+)/i);
    if (pm) {
      const pairing = pm[1].toUpperCase();
      const dayNum  = parseInt(pm[2]);
      const report  = pm[3];

      const legs=[], hotels=[];
      let blkt='', tcrd='', tdty='', lyovTime='', lyovCity='', endsNext=false;

      for (let i=1; i<block.length; i++) {
        const bl = block[i];

        // Flight leg: "3654 EWR SAV 1100 1330"
        const lm = bl.match(/^(\d{3,4})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{4})\s+(\d{4})/);
        if (lm) { legs.push({flt:lm[1],from:lm[2],to:lm[3],dep:lm[4],arr:lm[5]}); continue; }

        // D-END: "D-END 2154    BLKT 0638 TCRD 0638"
        const dem = bl.match(/D-END\s+\d+\s+BLKT\s+(\d+)\s+TCRD\s+(\d+)/i);
        if (dem) { blkt=dem[1]; tcrd=dem[2]; continue; }

        // TDTY: "TDTY  0852 LYOV  1650 STL"
        const tm = bl.match(/TDTY\s+(\d+)(?:\s+LYOV\s+(\d+)\s+([A-Z]{3}))?/i);
        if (tm) { tdty=tm[1]; if(tm[2]){lyovTime=tm[2]; lyovCity=tm[3];} continue; }

        // Hotel: any line with a phone number
        const hm = bl.match(/^(.+?)\s{2,}(\(\d{3}\)\d{3}-\d{4})/);
        if (hm) { hotels.push({name:hm[1].trim(), phone:hm[2]}); continue; }

        if (/PAIRING ENDS IN NEXT BID PERIOD/i.test(bl)) endsNext=true;
      }

      calDays[key] = {
        type: dayNum===1 ? 'pstart' : 'pcont',
        pairing, dayNum, report,
        legs, blkt, tcrd, tdty,
        lyovTime, lyovCity, hotels, endsNext,
        hasLayover: !!lyovCity,
        isFinal: !lyovCity && tcrd!==''
      };
      continue;
    }

    calDays[key] = { type:'off' };
  }

  // ── Second pass: link pairings, mark final days ──
  const pairingGroups = {}; // code → [keys]
  for (const [key, day] of Object.entries(calDays)) {
    if (!day.pairing) continue;
    if (!pairingGroups[day.pairing]) pairingGroups[day.pairing]=[];
    pairingGroups[day.pairing].push(key);
  }
  for (const [code, keys] of Object.entries(pairingGroups)) {
    keys.sort();
    const lastKey = keys[keys.length-1];
    if (calDays[lastKey]) calDays[lastKey].isFinal = true;
    // propagate totalCredit to all days of this pairing
    const cred = calDays[lastKey]?.tcrd || '';
    keys.forEach(k => { if(calDays[k]) calDays[k].totalCredit = cred; });
  }

  // ── Mark prior bid vs this bid ──
  // A day is "prior bid" if its pairing STARTED in a different (prior) month
  for (const [key, day] of Object.entries(calDays)) {
    if (!day.pairing) continue;
    const keys = pairingGroups[day.pairing] || [];
    keys.sort();
    if (keys.length === 0) continue;
    const firstKey = keys[0];
    const firstMo  = parseInt(firstKey.split('-')[1]) - 1;
    const thisMo   = parseInt(key.split('-')[1]) - 1;
    const thisYr   = parseInt(key.split('-')[0]);
    // if the pairing's first day is in a prior month → prior bid bleed
    if (firstMo !== bidMonthIdx && thisYr === bidYear && thisMo === bidMonthIdx) {
      day.priorBid = true;
    }
  }

  // ── Holiday detection ──
  // Scan every day that has a pairing (and is not prior bid) for holidays
  const workedHolidays = [];
  const allDateKeys = [];
  // generate all dates for this bid month
  for (let d=1; d<=daysInMonth; d++) {
    allDateKeys.push(dateKey(bidYear, bidMonthIdx, d));
  }
  // also next month bleed days
  for (const [key, day] of Object.entries(calDays)) {
    if (!allDateKeys.includes(key)) allDateKeys.push(key);
  }

  const holidayDays = {}; // key → holidayName
  for (const key of allDateKeys) {
    const [yr, mo, dd] = key.split('-').map(Number);
    const dateObj = new Date(yr, mo-1, dd);
    const name = getHolidayName(dateObj);
    if (name) holidayDays[key] = name;
  }

  for (const [key, name] of Object.entries(holidayDays)) {
    const day = calDays[key];
    if (day && day.pairing && !day.priorBid) {
      workedHolidays.push({ key, name, date: key });
      if (calDays[key]) calDays[key].isHoliday = true;
    }
  }

  // ── Credit totals (ported from Flask) ──
  // Base TCRD: sum all TCRD values from non-prior-bid pairing days
  let baseMinutes = 0;
  const seenTcrd = new Set(); // avoid double-counting per pairing
  for (const [key, day] of Object.entries(calDays)) {
    if (!day.pairing || day.priorBid) continue;
    if (day.tcrd && !seenTcrd.has(day.pairing + day.tcrd + key)) {
      seenTcrd.add(day.pairing + day.tcrd + key);
      baseMinutes += tcrdToMinutes(day.tcrd);
    }
  }
  const holidayMinutes = workedHolidays.length * HOLIDAY_BONUS_MIN;
  const totalMinutes   = baseMinutes + holidayMinutes;

  return {
    empNum, firstName, lastName, base, position, line24,
    bidMonthIdx, bidYear,
    monthName: MONTH_NAMES[bidMonthIdx],
    daysInMonth, firstDOW,
    calDays, pairingGroups, holidayDays,
    workedHolidays, holidayDays,
    baseMinutes, holidayMinutes, totalMinutes
  };
}

// ═══════════════════════════════════════
// RENDERER
// ═══════════════════════════════════════
function renderCalendar(data) {
  const {
    empNum, firstName, lastName, base, position, line24,
    bidMonthIdx, bidYear, monthName, daysInMonth, firstDOW,
    calDays, pairingGroups, holidayDays,
    workedHolidays, baseMinutes, holidayMinutes, totalMinutes
  } = data;

  // ── Count pairings that belong to this bid ──
  const bidPairings = new Set();
  for (const [key, day] of Object.entries(calDays)) {
    if (day.pairing && !day.priorBid) bidPairings.add(day.pairing);
  }

  const nameStr = firstName && lastName ? `${firstName} ${lastName}` : (lastName || empNum);
  const subParts = [empNum, nameStr, base, position];
  if (line24) subParts.push(`Line ${line24}`);

  // ── Build cell HTML ──
  function buildTooltip(day, dayNum, mo, yr) {
    if (!day || !day.pairing) return '';
    const legHTML = (day.legs||[]).map(l =>
      `<div class="tt-leg">
        <span class="tt-fnum">${l.flt}</span>
        <span class="tt-from">${l.from}</span>
        <span class="tt-arrow">›</span>
        <span class="tt-to">${l.to}</span>
        <span class="tt-dep">${fmtTime(l.dep)}</span>
        <span class="tt-arr">${fmtTime(l.arr)}</span>
      </div>`
    ).join('');

    const statsHTML = [
      day.report ? `<div class="tt-row"><span class="tt-lbl">Report</span><span class="tt-val g">${fmtTime(day.report)}</span></div>` : '',
      day.blkt   ? `<div class="tt-row"><span class="tt-lbl">Block</span><span class="tt-val b">${fmtCredit(day.blkt)}</span></div>` : '',
      day.tcrd   ? `<div class="tt-row"><span class="tt-lbl">Trip Credit</span><span class="tt-val gr">${fmtCredit(day.tcrd)}</span></div>` : '',
      day.tdty   ? `<div class="tt-row"><span class="tt-lbl">Duty</span><span class="tt-val">${fmtCredit(day.tdty)}</span></div>` : '',
      day.lyovCity ? `<div class="tt-row"><span class="tt-lbl">Layover</span><span class="tt-val b">${day.lyovCity} (${fmtCredit(day.lyovTime)})</span></div>` : '',
    ].filter(Boolean).join('');

    const hotelHTML = (day.hotels||[]).map(h =>
      `<div class="tt-hotel"><div class="tt-hotel-name">🏨 ${h.name}</div>${h.phone?`<div class="tt-hotel-ph">${h.phone}</div>`:''}</div>`
    ).join('');

    const key = dateKey(yr, mo, dayNum);
    const holName = holidayDays[key];
    const holHTML = holName
      ? `<div class="tt-holiday">★ Holiday: ${holName}${day.isHoliday?' (+ bonus credit)':''}</div>`
      : '';

    return `<div class="tt">
      <div class="tt-head">
        <div><div class="tt-code">${day.pairing}</div></div>
        <div class="tt-meta">Day ${day.dayNum}${day.priorBid?' · Prior Bid':''}</div>
      </div>
      ${legHTML ? `<div class="tt-legs">${legHTML}</div><hr class="tt-div">` : ''}
      ${statsHTML}
      ${hotelHTML}
      ${holHTML}
    </div>`;
  }

  function renderCell(dayNum, mo, yr, isNextMoLabel=false) {
    const key = dateKey(yr, mo, dayNum);
    const day = calDays[key];
    const dateObj = new Date(yr, mo, dayNum);
    const holName = holidayDays[key];
    const dayLabel = isNextMoLabel
      ? `<div class="dn" style="font-size:10px;">${MONTH_SHORT[mo]} ${dayNum}</div>`
      : `<div class="dn">${String(dayNum).padStart(2,'0')}</div>`;

    if (!day || day.type==='off') {
      const holCls = holName ? ' holiday-off' : '';
      const holLbl = holName ? `<div class="holiday-lbl">${holName}</div>` : '';
      return `<div class="dc off${holCls}">${dayLabel}<div class="off-lbl">OFF</div>${holLbl}</div>`;
    }

    if (day.priorBid) {
      const tt = buildTooltip(day, dayNum, mo, yr);
      return `<div class="dc prior">
        ${dayLabel}
        <div class="prior-stamp">PRIOR BID</div>
        <div class="pcode prior-c">${day.pairing}</div>
        ${day.isFinal ? `<div class="trow"><span class="tv rel-prior">REL ${fmtTime(day.tdty)}</span></div>` : ''}
        ${tt}
      </div>`;
    }

    const isPstart = day.type==='pstart';
    const cls = isPstart ? 'pstart' : 'pcont';
    const holCls = day.isHoliday ? ' holiday-worked' : '';
    const pcCls = isPstart ? '' : 'cont';

    const timeRow = isPstart
      ? `<div class="trow"><span class="tv rpt">RPT ${fmtTime(day.report)}</span></div>`
      : (day.isFinal ? `<div class="trow"><span class="tv rel">REL ${fmtTime(day.tdty)}</span></div>` : '');

    const badge  = day.lyovCity ? `<div class="lbadge">${day.lyovCity}</div>` : '';
    const credit = day.isFinal && day.tcrd ? `<div class="cred">${fmtCredit(day.tcrd)} credit</div>` : '';
    const tt     = buildTooltip(day, dayNum, mo, yr);

    return `<div class="dc ${cls}${holCls}">
      ${dayLabel}
      <div class="pcode ${pcCls}">${day.pairing}</div>
      ${timeRow}
      ${badge}
      ${credit}
      ${tt}
    </div>`;
  }

  // ── Assemble grid ──
  let cells = '';

  // Empty leading cells
  for (let i=0; i<firstDOW; i++) cells += `<div class="dc empty"></div>`;

  // This month's days
  for (let d=1; d<=daysInMonth; d++) {
    cells += renderCell(d, bidMonthIdx, bidYear);
  }

  // Next-month bleed days that belong to this bid
  const nextMo = (bidMonthIdx+1)%12;
  const nextYr = nextMo===0 ? bidYear+1 : bidYear;
  for (let d=1; d<=7; d++) {
    const key = dateKey(nextYr, nextMo, d);
    const day = calDays[key];
    if (day && day.pairing && !day.priorBid) {
      cells += renderCell(d, nextMo, nextYr, true);
    } else break;
  }

  // Fill trailing cells
  const cellCount = (cells.match(/class="dc/g)||[]).length;
  const rem = cellCount % 7;
  if (rem > 0) for (let i=0; i<7-rem; i++) cells += `<div class="dc empty"></div>`;

  // ── Pairing cards ──
  const seenCards = new Set();
  let pCardHTML = '';
  // Sort pairings by their first date
  const sortedPairings = [...bidPairings].sort((a,b) => {
    const ka = (pairingGroups[a]||[]).sort()[0]||'';
    const kb = (pairingGroups[b]||[]).sort()[0]||'';
    return ka.localeCompare(kb);
  });

  for (const code of sortedPairings) {
    if (seenCards.has(code)) continue;
    seenCards.add(code);
    const keys = (pairingGroups[code]||[]).filter(k => !calDays[k]?.priorBid).sort();
    if (!keys.length) continue;

    const firstKey = keys[0], lastKey = keys[keys.length-1];
    const [fy,fm,fd] = firstKey.split('-').map(Number);
    const [ly,lm,ld] = lastKey.split('-').map(Number);
    const dateRange = (fm===lm)
      ? `${MONTH_SHORT[fm-1]} ${fd} – ${ld}`
      : `${MONTH_SHORT[fm-1]} ${fd} – ${MONTH_SHORT[lm-1]} ${ld}`;

    // Collect all legs for route
    const allLegs = [];
    for (const k of keys) { const d=calDays[k]; if(d?.legs) allLegs.push(...d.legs); }
    const routeApts = [];
    for (const l of allLegs) {
      if (!routeApts.length) routeApts.push(l.from);
      routeApts.push(l.to);
    }
    // dedup consecutive
    const uniq = routeApts.filter((a,i) => i===0 || a!==routeApts[i-1]);
    const routeHTML = uniq.map((a,i) =>
      i < uniq.length-1
        ? `<span class="apt">${a}</span><span class="rt-arr">›</span>`
        : `<span class="apt">${a}</span>`
    ).join('');

    const firstDay = calDays[firstKey], lastDay = calDays[lastKey];
    const rpt    = fmtTime(firstDay?.report || '');
    const rel    = fmtTime(lastDay?.tdty || '');
    const credit = fmtCredit(lastDay?.tcrd || '');
    const layovers = keys.map(k => calDays[k]?.lyovCity).filter(Boolean);
    const hasHol = keys.some(k => calDays[k]?.isHoliday);

    pCardHTML += `<div class="pcard">
      <div class="pc-code">${code}</div>
      <div class="pc-dates">${dateRange} &nbsp;·&nbsp; ${keys.length}-day &nbsp;·&nbsp; ${position}</div>
      <div class="route">${routeHTML}</div>
      <div class="pstats">
        <div class="ps"><div class="ps-l">RPT</div><div class="ps-v">${rpt}</div></div>
        <div class="ps"><div class="ps-l">REL</div><div class="ps-v">${rel}</div></div>
        <div class="ps"><div class="ps-l">Credit</div><div class="ps-v">${credit}</div></div>
      </div>
      <div class="pills">
        ${layovers.length ? `<span class="pill-lay">✈ ${layovers.join(' · ')}</span>` : ''}
        ${credit ? `<span class="pill-cr">${credit}</span>` : ''}
        ${hasHol ? `<span class="pill-hol">★ Holiday</span>` : ''}
      </div>
    </div>`;
  }

  // ── Holiday section ──
  let holSectionHTML = '';
  if (workedHolidays.length > 0) {
    const holCards = workedHolidays.map(h => {
      const [yr, mo, dd] = h.key.split('-').map(Number);
      const d = new Date(yr, mo-1, dd);
      const dayStr = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      return `<div class="hol-card">
        <div class="hol-name">${h.name}</div>
        <div class="hol-date">${dayStr}</div>
        <div class="hol-bonus">+${minutesToHHMM(HOLIDAY_BONUS_MIN)} bonus</div>
      </div>`;
    }).join('');
    holSectionHTML = `<div class="holiday-section">
      <h2>HOLIDAY PAY</h2>
      <div class="hol-cards">${holCards}</div>
    </div>`;
  }

  // ── Stats ──
  const statsHTML = `
    <div class="stat"><div class="stat-l">Pairings</div><div class="stat-v">${bidPairings.size}</div></div>
    <div class="stat"><div class="stat-l">Trip Credit</div><div class="stat-v">${minutesToHHMM(baseMinutes)}</div></div>
    ${holidayMinutes > 0 ? `<div class="stat"><div class="stat-l">Holiday Bonus</div><div class="stat-v holiday">+${minutesToHHMM(holidayMinutes)}</div></div>` : ''}
    ${holidayMinutes > 0 ? `<div class="stat"><div class="stat-l">Total Credit</div><div class="stat-v">${minutesToHHMM(totalMinutes)}</div></div>` : ''}
  `;

  return `
    <div class="cal-header">
      <div>
        <div class="tag">Crew Schedule</div>
        <h1>${monthName.toUpperCase()} <span>${bidYear}</span></h1>
        <div class="sub">${subParts.filter(Boolean).join(' &nbsp;·&nbsp; ')}</div>
      </div>
      <div class="stats">${statsHTML}</div>
    </div>

    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div>Pairing Start</div>
      <div class="leg"><div class="leg-dot" style="background:var(--accent2)"></div>Continuation / Release</div>
      <div class="leg"><div class="leg-dot" style="background:#0e1016;border:1px solid #181c24"></div>Day Off</div>
      <div class="leg"><div class="leg-dot" style="background:#0c0e14;border:1px dashed #252a36"></div>Prior Bid</div>
      ${workedHolidays.length ? `<div class="leg"><div class="leg-dot" style="background:var(--card);border:1px solid var(--border);font-size:7px;display:flex;align-items:center;justify-content:center;color:var(--green)">★</div>Holiday Worked</div>` : ''}
      <div class="leg" style="opacity:0.5;font-size:10px;">Hover days for details</div>
    </div>

    <div class="dow-row">
      <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
      <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>
    </div>

    <div class="cal">${cells}</div>

    <div class="summary">
      <h2>PAIRINGS DETAIL</h2>
      <div class="pcards">${pCardHTML}</div>
    </div>

    ${holSectionHTML}
  `;
}

// ═══════════════════════════════════════
// APP LOGIC
// ═══════════════════════════════════════
function handleParse() {
  const text = document.getElementById('sched-input').value.trim();
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  if (!text) {
    errEl.textContent = 'Please paste your schedule text first.';
    errEl.classList.add('show');
    return;
  }

  try {
    const data = parseSchedule(text);
    const html = renderCalendar(data);
    document.getElementById('cal-output').innerHTML = html;
    document.getElementById('paste-screen').style.display = 'none';
    document.getElementById('cal-screen').classList.add('show');
    window.scrollTo(0,0);
  } catch(e) {
    errEl.textContent = 'Error: ' + (e.message || 'Could not parse schedule. Make sure this is a Sabre CrewTrac Schedule Detail Report.');
    errEl.classList.add('show');
    console.error(e);
  }
}

function goBack() {
  document.getElementById('cal-screen').classList.remove('show');
  document.getElementById('paste-screen').style.display = 'flex';
  window.scrollTo(0,0);
}

document.getElementById('sched-input').addEventListener('keydown', e => {
