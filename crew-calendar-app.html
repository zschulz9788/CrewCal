<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrewCal — Airline Schedule Parser</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --card: #161a22;
    --border: #1e2330;
    --accent: #e8c84a;
    --accent2: #4a8fe8;
    --green: #4ae8a0;
    --red: #e84a6a;
    --text: #e8eaf0;
    --muted: #5a6070;
    --off-bg: #0e1016;
    --off-border: #181c24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif; min-height:100vh;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(232,200,74,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,200,74,0.02) 1px, transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }

  /* ── UPLOAD SCREEN ── */
  #upload-screen {
    position:relative; z-index:1;
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:40px 20px;
  }
  .brand {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,8vw,96px);
    letter-spacing:0.06em; line-height:1; margin-bottom:6px;
    background: linear-gradient(135deg, var(--accent), #f0a030);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .brand-sub {
    font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.2em;
    color:var(--muted); text-transform:uppercase; margin-bottom:60px;
  }

  .upload-zone {
    width:100%; max-width:560px;
    border:1px dashed #2a3040; border-radius:16px;
    padding:60px 40px; text-align:center; cursor:pointer;
    transition:all 0.2s; position:relative; background:rgba(22,26,34,0.6);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color:var(--accent); background:rgba(232,200,74,0.04);
  }
  .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .upload-icon {
    font-size:48px; margin-bottom:20px; display:block;
    filter:grayscale(1) opacity(0.4);
  }
  .upload-zone h2 {
    font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:0.06em;
    color:var(--text); margin-bottom:8px;
  }
  .upload-zone p {
    font-family:'DM Mono',monospace; font-size:11px; color:var(--muted);
    letter-spacing:0.08em; line-height:1.7;
  }
  .upload-zone .hint {
    margin-top:24px; font-size:10px; color:#2a3040;
    font-family:'DM Mono',monospace; letter-spacing:0.1em; text-transform:uppercase;
  }

  .supported {
    margin-top:32px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
  }
  .sup-tag {
    font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.1em;
    color:var(--muted); background:rgba(255,255,255,0.04);
    border:1px solid var(--border); border-radius:4px; padding:4px 10px;
    text-transform:uppercase;
  }

  /* ── LOADING ── */
  #loading-screen {
    display:none; position:fixed; inset:0; z-index:100;
    background:var(--bg); align-items:center; justify-content:center;
    flex-direction:column; gap:24px;
  }
  #loading-screen.show { display:flex; }
  .loader-ring {
    width:60px; height:60px; border-radius:50%;
    border:2px solid var(--border); border-top-color:var(--accent);
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loader-text {
    font-family:'DM Mono',monospace; font-size:12px; letter-spacing:0.15em;
    color:var(--muted); text-transform:uppercase;
  }
  .loader-step {
    font-family:'DM Mono',monospace; font-size:11px; color:var(--accent);
    letter-spacing:0.1em; min-height:18px; transition:opacity 0.3s;
  }

  /* ── CALENDAR SCREEN ── */
  #calendar-screen {
    display:none; position:relative; z-index:1;
    padding:32px 20px 60px;
  }
  #calendar-screen.show { display:block; }

  .page-wrapper { max-width:1140px; margin:0 auto; }

  /* top nav */
  .top-nav {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:32px; flex-wrap:wrap; gap:12px;
  }
  .nav-brand {
    font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.1em;
    color:var(--accent); opacity:0.7;
  }
  .btn-new {
    font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.1em;
    text-transform:uppercase; color:var(--muted); background:transparent;
    border:1px solid var(--border); border-radius:6px; padding:8px 16px;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-new:hover { border-color:var(--accent); color:var(--accent); }

  /* header */
  header {
    display:flex; align-items:flex-end; justify-content:space-between;
    margin-bottom:36px; padding-bottom:24px; border-bottom:1px solid var(--border);
    flex-wrap:wrap; gap:20px;
  }
  .tag { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.18em; color:var(--accent); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .tag::before { content:''; display:inline-block; width:20px; height:1px; background:var(--accent); }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(44px,6vw,76px); letter-spacing:0.04em; line-height:0.9; }
  h1 span { color:var(--accent); }
  .sub { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); margin-top:8px; letter-spacing:0.08em; }
  .stats { display:flex; gap:20px; flex-wrap:wrap; align-items:flex-end; }
  .stat { text-align:right; }
  .stat-l { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .stat-v { font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:var(--accent); }

  /* legend */
  .legend { display:flex; gap:18px; margin-bottom:24px; flex-wrap:wrap; }
  .leg { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:0.05em; }
  .leg-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

  /* dow */
  .dow-row { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:3px; }
  .dow { text-align:center; font-family:'DM Mono',monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); padding:8px 0; }

  /* ── CALENDAR GRID ── */
  .cal { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }

  .dc {
    background:var(--card); border:1px solid var(--border); border-radius:8px;
    min-height:112px; padding:9px 9px 7px; position:relative; overflow:visible;
    transition:border-color 0.18s, transform 0.15s; cursor:default;
  }
  .dc:hover { border-color:#3a4050; transform:translateY(-1px); z-index:50; }
  .dc.empty { background:transparent; border-color:transparent; min-height:0; cursor:default; }
  .dc.empty:hover { transform:none; border-color:transparent; }

  .dc.off { background:var(--off-bg); border-color:var(--off-border); }
  .dc.off .dn { color:#2e3440; }

  .dc.pstart { background:linear-gradient(160deg,#161a22,#191e2a); border-color:rgba(232,200,74,0.3); cursor:pointer; }
  .dc.pstart::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent); border-radius:8px 8px 0 0; }

  .dc.pcont { background:linear-gradient(160deg,#161a22,#151d2a); border-color:rgba(74,143,232,0.3); cursor:pointer; }
  .dc.pcont::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:var(--accent2); border-radius:8px 8px 0 0; }

  .dc.prior { background:#0c0e14; border:1px dashed #252a36; opacity:0.65; }
  .dc.prior::before { display:none; }

  .dn { font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:5px; }
  .dc.pstart .dn, .dc.pcont .dn { color:var(--text); }
  .dc.prior .dn { color:#3a4050; }

  .off-lbl { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:#2a3040; }
  .prior-stamp { display:inline-block; font-family:'DM Mono',monospace; font-size:8px; letter-spacing:0.1em; text-transform:uppercase; color:#3a4a5a; background:rgba(74,143,232,0.06); border:1px solid rgba(74,143,232,0.12); border-radius:3px; padding:1px 5px; margin-bottom:4px; }

  .pcode { font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:0.04em; color:var(--accent); line-height:1; margin-bottom:3px; }
  .pcode.cont { color:var(--accent2); font-size:16px; }
  .pcode.prior-c { color:#3a6070; font-size:16px; }

  .trow { display:flex; justify-content:space-between; }
  .tv { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); }
  .tv.rpt { color:rgba(232,200,74,0.75); }
  .tv.rel { color:rgba(74,143,232,0.85); }
  .tv.rel-prior { color:rgba(74,143,232,0.45); }

  .lbadge { display:inline-flex; align-items:center; gap:3px; background:rgba(74,143,232,0.1); border:1px solid rgba(74,143,232,0.2); border-radius:4px; padding:2px 6px; margin-top:5px; font-family:'DM Mono',monospace; font-size:10px; font-weight:500; color:var(--accent2); letter-spacing:0.08em; }
  .cred { font-family:'DM Mono',monospace; font-size:9px; color:var(--green); margin-top:4px; }

  /* ── HOVER TOOLTIP ── */
  .tooltip {
    display:none; position:absolute; top:calc(100% + 8px); left:0;
    width:300px; background:#1a1f2e; border:1px solid var(--border);
    border-radius:10px; padding:14px; z-index:200;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    pointer-events:none;
  }
  /* flip to left if cell is in right half */
  .dc:nth-child(7n+5) .tooltip,
  .dc:nth-child(7n+6) .tooltip,
  .dc:nth-child(7n) .tooltip { left:auto; right:0; }

  .dc:hover .tooltip { display:block; }

  .tt-header {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border);
  }
  .tt-code { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--accent); letter-spacing:0.04em; line-height:1; }
  .tt-day { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); text-align:right; margin-top:2px; }

  .tt-legs { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
  .tt-leg {
    display:grid; grid-template-columns:36px 1fr auto 1fr 36px;
    align-items:center; gap:4px;
    font-family:'DM Mono',monospace; font-size:10px;
  }
  .tt-apt { font-family:'Bebas Neue',sans-serif; font-size:14px; color:var(--text); letter-spacing:0.04em; }
  .tt-flt { font-size:9px; color:var(--muted); text-align:center; }
  .tt-time { font-size:10px; color:var(--accent2); }
  .tt-arr-time { font-size:10px; color:var(--green); text-align:right; }
  .tt-arrow { color:var(--muted); font-size:9px; text-align:center; }

  .tt-row { display:flex; justify-content:space-between; font-family:'DM Mono',monospace; font-size:10px; padding:3px 0; }
  .tt-label { color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; font-size:9px; }
  .tt-val { color:var(--text); }
  .tt-val.gold { color:var(--accent); }
  .tt-val.blue { color:var(--accent2); }
  .tt-val.green { color:var(--green); }

  .tt-hotel { margin-top:8px; padding-top:8px; border-top:1px solid var(--border); }
  .tt-hotel-name { font-family:'DM Sans',sans-serif; font-size:11px; color:var(--text); margin-bottom:2px; }
  .tt-hotel-phone { font-family:'DM Mono',monospace; font-size:10px; color:var(--accent2); }
  .tt-hotel-icon { font-size:9px; color:var(--muted); margin-right:4px; }

  .tt-divider { border:none; border-top:1px solid var(--border); margin:8px 0; }

  /* ── PAIRINGS SUMMARY ── */
  .summary { margin-top:44px; border-top:1px solid var(--border); padding-top:32px; }
  .summary h2 { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.06em; margin-bottom:20px; }
  .pcards { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px; }
  .pcard { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 18px 16px; position:relative; overflow:hidden; }
  .pcard::before { content:''; position:absolute; top:0;left:0; width:3px; height:100%; background:var(--accent); }
  .pc-code { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.04em; color:var(--accent); line-height:1; }
  .pc-dates { font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); margin-top:2px; margin-bottom:12px; }
  .route { display:flex; align-items:center; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .apt { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:0.06em; color:var(--text); }
  .arr { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .pstats { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .ps { background:var(--surface); border-radius:6px; padding:7px 8px; }
  .ps-l { font-family:'DM Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-bottom:2px; }
  .ps-v { font-family:'DM Mono',monospace; font-size:13px; color:var(--text); font-weight:500; }
  .pills { margin-top:10px; display:flex; gap:6px; flex-wrap:wrap; }
  .pill-lay { display:inline-flex; align-items:center; gap:4px; background:rgba(74,143,232,0.1); border:1px solid rgba(74,143,232,0.2); border-radius:20px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:11px; color:var(--accent2); }
  .pill-cr { display:inline-flex; align-items:center; gap:4px; background:rgba(74,232,160,0.08); border:1px solid rgba(74,232,160,0.15); border-radius:20px; padding:3px 10px; font-family:'DM Mono',monospace; font-size:11px; color:var(--green); }

  /* ── ERROR ── */
  #error-banner {
    display:none; background:rgba(232,74,106,0.1); border:1px solid rgba(232,74,106,0.3);
    border-radius:8px; padding:16px 20px; margin:20px auto; max-width:560px;
    font-family:'DM Mono',monospace; font-size:12px; color:var(--red);
    letter-spacing:0.06em; text-align:center; position:relative; z-index:2;
  }
  #error-banner.show { display:block; }

  @media(max-width:640px){
    .dc { min-height:85px; padding:7px 6px; }
    .pcode { font-size:14px; }
    .tv { font-size:9px; }
    .lbadge { font-size:9px; }
    .tooltip { width:260px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     UPLOAD SCREEN
══════════════════════════════════════════ -->
<div id="upload-screen">
  <div class="brand">CrewCal</div>
  <div class="brand-sub">Airline Schedule Parser</div>

  <div class="upload-zone" id="drop-zone">
    <input type="file" id="file-input" accept="image/*,.png,.jpg,.jpeg">
    <span class="upload-icon">✈</span>
    <h2>Drop Your Schedule</h2>
    <p>Upload a screenshot of your Sabre CrewTrac<br>Schedule Detail Report</p>
    <div class="hint">Click to browse or drag &amp; drop</div>
  </div>

  <div class="supported">
    <span class="sup-tag">Sabre CrewTrac</span>
    <span class="sup-tag">Schedule Detail Report</span>
    <span class="sup-tag">PNG · JPG</span>
  </div>

  <div id="error-banner"></div>
</div>

<!-- ══════════════════════════════════════════
     LOADING SCREEN
══════════════════════════════════════════ -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Parsing Schedule</div>
  <div class="loader-step" id="loader-step">Reading image...</div>
</div>

<!-- ══════════════════════════════════════════
     CALENDAR SCREEN
══════════════════════════════════════════ -->
<div id="calendar-screen">
  <div class="page-wrapper">
    <div class="top-nav">
      <div class="nav-brand">CrewCal</div>
      <button class="btn-new" onclick="resetApp()">↑ Upload New Schedule</button>
    </div>
    <div id="calendar-output"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// PARSING RULES (all learned from Zachary's schedules)
// ══════════════════════════════════════════
// Format: Sabre CrewTrac "Schedule Detail Report"
//
// Header line: "625778 SCHULZ,ZACHARY JOHN SEN# 02550 BID EWR EM7 FO"
//   → employee#, name, base, position
//
// "PERIOD 0326" → bid period = March 2026
//
// Day lines:
//   "02 MAR OFF"  → day off
//   "09 MAR R7373 /0309 POS FO DAY 01 REPORT 1614" → pairing start
//      - date: 09 MAR
//      - pairing: R7373
//      - day of pairing: 01
//      - report time: 1614
//   Flight leg: "3654 EWR SAV 1100 1330"
//      - flight: 3654, from: EWR, to: SAV, dep: 1100, arr: 1330
//   "D-END 2154    BLKT 0638 TCRD 0638"
//      - duty end: 2154, block time: 0638, trip credit: 0638
//   "TDTY  0852 LYOV  1650 STL"
//      - total duty: 0852, layover time: 1650, layover city: STL
//   Hotel line: "SHERATON WESTPORT CHALET  (314)878-1500"
//   Continuation day: "10 MAR R7373 /0309 POS FO DAY 02 REPORT 1656"
//   Final day: has no LYOV line, has TDTY but no hotel
//   "PAIRING ENDS IN NEXT BID PERIOD" → bleed-out flag
//
// RULES:
//   - Days in this bid's pairings that spill to next month → full color, no dim
//   - Days from PREVIOUS bid bleeding into this month → dashed + "PRIOR BID" stamp
//   - Prior bid days: show pairing code + REL only, no credit
//   - OFF days → dark cell
//   - Pairing start → gold top bar
//   - All other pairing days → blue top bar
//   - Credit shown on final day of pairing
//   - Hover shows: individual legs, times, BLKT, TCRD, TDTY, hotel info

const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function formatTime(t) {
  if (!t || t.length < 3) return t;
  const s = t.toString().padStart(4,'0');
  return s.slice(0,2) + ':' + s.slice(2);
}

function fmtHHMM(raw) {
  // "0638" → "6h38"
  if (!raw) return '';
  const s = raw.toString().padStart(4,'0');
  const h = parseInt(s.slice(0,2));
  const m = s.slice(2);
  return `${h}h${m}`;
}

function parseSchedule(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

  // ── HEADER ──
  let empNum = '', lastName = '', firstName = '', base = '', position = '';
  let bidPeriod = '', bidMonthIdx = -1, bidYear = 2026;
  let priorBidDays = {}; // date string → pairing info from prior bid

  for (const line of lines) {
    // "625778 SCHULZ,ZACHARY JOHN SEN# 02550 BID EWR EM7 FO"
    const headerM = line.match(/^(\d{6})\s+([A-Z]+),([A-Z\s]+)\s+SEN#.*BID\s+([A-Z]{3})\s+\S+\s+(FO|CA|FA)/i);
    if (headerM) {
      empNum = headerM[1];
      lastName = headerM[2];
      firstName = headerM[3].trim();
      base = headerM[4];
      position = headerM[5];
    }
    // "PERIOD 0326"
    const periodM = line.match(/PERIOD\s+(\d{2})(\d{2})/);
    if (periodM) {
      bidMonthIdx = parseInt(periodM[1]) - 1;
      bidYear = 2000 + parseInt(periodM[2]);
      bidPeriod = `${MONTHS[bidMonthIdx]} ${bidYear}`;
    }
  }

  if (bidMonthIdx < 0) {
    // Try to find month from day lines
    for (const line of lines) {
      const m = line.match(/^\d{2}\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)/i);
      if (m) {
        bidMonthIdx = MONTHS.indexOf(m[1].toUpperCase());
        break;
      }
    }
  }

  const monthName = MONTH_NAMES[bidMonthIdx] || 'Unknown';
  const daysInMonth = new Date(bidYear, bidMonthIdx + 1, 0).getDate();
  const firstDOW = new Date(bidYear, bidMonthIdx, 1).getDay(); // 0=Sun

  // ── PARSE DAY BLOCKS ──
  // Group lines by date
  const dayBlocks = {}; // "DD" → array of lines
  let currentDay = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const dayM = line.match(/^(\d{2})\s+(JAN|FEB|MAR|APR|MAY|JUN|JUL|AUG|SEP|OCT|NOV|DEC)\s+(.*)/i);
    if (dayM) {
      const dayNum = dayM[1];
      const mon = dayM[2].toUpperCase();
      const rest = dayM[3].trim();
      const monIdx = MONTHS.indexOf(mon);
      // Build key: YYYY-MM-DD
      let yr = bidYear;
      // If month is different from bid month, it's a bleed
      if (monIdx !== bidMonthIdx) {
        // adjacent month
        if (monIdx === (bidMonthIdx + 1) % 12) yr = (monIdx === 0) ? bidYear + 1 : bidYear;
        else yr = bidYear; // prior month same year usually
      }
      const key = `${yr}-${String(monIdx+1).padStart(2,'0')}-${dayNum}`;
      if (!dayBlocks[key]) dayBlocks[key] = [];
      dayBlocks[key].push(rest);
      currentDay = key;
    } else if (currentDay) {
      dayBlocks[currentDay].push(line);
    }
  }

  // ── PARSE EACH DAY ──
  const calDays = {}; // key → parsed day object

  for (const [key, blockLines] of Object.entries(dayBlocks)) {
    const firstLine = blockLines[0] || '';

    if (firstLine === 'OFF') {
      calDays[key] = { type: 'off' };
      continue;
    }

    // Pairing line: "R7373 /0309 POS FO DAY 01 REPORT 1614"
    const pairingM = firstLine.match(/^(R\d+)\s+\/(\d+)\s+POS\s+\S+\s+DAY\s+(\d+)\s+REPORT\s+(\d+)/i);
    if (pairingM) {
      const pairing = pairingM[1];
      const dayOfPairing = parseInt(pairingM[3]);
      const reportTime = pairingM[4];

      // Parse legs, duty end, layover, hotel
      const legs = [];
      let blkt = '', tcrd = '', tdty = '', lyovTime = '', lyovCity = '';
      let hotel = '', hotelPhone = '';
      let endsNextPeriod = false;

      for (let i = 1; i < blockLines.length; i++) {
        const bl = blockLines[i];

        // Flight leg: "3654 EWR SAV 1100 1330" or "3654 EWR SAV 1100 1330 +1"
        const legM = bl.match(/^(\d{3,4})\s+([A-Z]{3})\s+([A-Z]{3})\s+(\d{4})\s+(\d{4})/);
        if (legM) {
          legs.push({ flt: legM[1], from: legM[2], to: legM[3], dep: legM[4], arr: legM[5] });
          continue;
        }

        // D-END line: "D-END 2154    BLKT 0638 TCRD 0638"
        const dendM = bl.match(/D-END\s+(\d+)\s+BLKT\s+(\d+)\s+TCRD\s+(\d+)/i);
        if (dendM) { blkt = dendM[2]; tcrd = dendM[3]; continue; }

        // TDTY line: "TDTY  0852 LYOV  1650 STL"
        const tdtyM = bl.match(/TDTY\s+(\d+)(?:\s+LYOV\s+(\d+)\s+([A-Z]{3}))?/i);
        if (tdtyM) {
          tdty = tdtyM[1];
          if (tdtyM[2]) { lyovTime = tdtyM[2]; lyovCity = tdtyM[3]; }
          continue;
        }

        // Hotel: "SHERATON WESTPORT CHALET  (314)878-1500"
        const hotelM = bl.match(/^([A-Z][A-Z\s&]+?)\s{2,}(\(\d{3}\)\d{3}-\d{4})/i);
        if (hotelM) { hotel = hotelM[1].trim(); hotelPhone = hotelM[2]; continue; }

        // Hotel without phone
        if (!hotel && bl.match(/^[A-Z][A-Z\s&]{5,}$/) && !bl.match(/^(PAIRING|PERIOD|CROWNE|DOUBLETREE|SHERATON|HOLIDAY|MARRIOTT|HILTON)/i) === false) {
          const hotelOnlyM = bl.match(/^([A-Z][A-Z\s&,]+(?:INN|HOTEL|SUITES|PLAZA|CHALET|METRO|AIRP)[A-Z\s&,]*)\s+(\(\d{3}\)\d{3}-\d{4})/i);
          if (hotelOnlyM) { hotel = hotelOnlyM[1].trim(); hotelPhone = hotelOnlyM[2]; continue; }
        }

        // Catch hotel lines with phone on same line (various formats)
        const anyHotelM = bl.match(/^(.{8,40}?)\s+(\(\d{3}\)\d{3}-\d{4})/);
        if (anyHotelM && !bl.match(/^D-END|^TDTY|^\d{4}|^R\d/)) {
          hotel = anyHotelM[1].trim(); hotelPhone = anyHotelM[2];
          continue;
        }

        if (bl.includes('PAIRING ENDS IN NEXT BID PERIOD')) { endsNextPeriod = true; }
      }

      calDays[key] = {
        type: dayOfPairing === 1 ? 'pstart' : 'pcont',
        pairing, dayOfPairing, reportTime,
        legs, blkt, tcrd, tdty, lyovTime, lyovCity,
        hotel, hotelPhone, endsNextPeriod,
        isFinalDay: !lyovCity && tcrd !== ''
      };
      continue;
    }

    // Unknown — treat as off
    calDays[key] = { type: 'off' };
  }

  // ── SECOND PASS: mark final days & link pairings ──
  // Group all days by pairing code to find last day
  const pairingGroups = {};
  for (const [key, day] of Object.entries(calDays)) {
    if (day.pairing) {
      if (!pairingGroups[day.pairing]) pairingGroups[day.pairing] = [];
      pairingGroups[day.pairing].push(key);
    }
  }
  for (const [code, keys] of Object.entries(pairingGroups)) {
    keys.sort();
    const lastKey = keys[keys.length - 1];
    calDays[lastKey].isFinalDay = true;
    // credit from last day
    const credit = calDays[lastKey].tcrd;
    for (const k of keys) { calDays[k].totalCredit = credit; }
  }

  // ── DETERMINE PRIOR BID DAYS ──
  // Any day in a non-bid month that appears = bleed
  // A day is "prior bid" if its month < bid month (or it's the first day of bid month
  // and the pairing started in the prior month)
  for (const [key, day] of Object.entries(calDays)) {
    const [yr, mo, dd] = key.split('-').map(Number);
    if (mo - 1 !== bidMonthIdx) {
      // This day is outside the bid month
      if (mo - 1 < bidMonthIdx || (bidMonthIdx === 0 && mo === 12)) {
        day.priorBid = true;
      } else {
        day.nextMonthBleed = true; // belongs to this bid but next calendar month
      }
    }
  }

  // ── DETECT PRIOR BID BLEED INTO FIRST DAYS ──
  // If day 1 of the bid month has a pairing that started in the prior month
  for (let d = 1; d <= 7; d++) {
    const key = `${bidYear}-${String(bidMonthIdx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = calDays[key];
    if (day && day.type === 'pcont' && day.pairing) {
      // Check if pairing start is before this month
      const pKeys = pairingGroups[day.pairing] || [];
      if (pKeys.length > 0) {
        pKeys.sort();
        const firstKey = pKeys[0];
        const firstMo = parseInt(firstKey.split('-')[1]);
        if (firstMo !== bidMonthIdx + 1) {
          day.priorBid = true;
        }
      }
    }
  }

  return {
    empNum, lastName, firstName, base, position,
    bidPeriod, bidMonthIdx, bidYear, monthName,
    daysInMonth, firstDOW,
    calDays, pairingGroups
  };
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderCalendar(data) {
  const {
    empNum, lastName, firstName, base, position,
    bidPeriod, bidMonthIdx, bidYear, monthName,
    daysInMonth, firstDOW, calDays, pairingGroups
  } = data;

  // Collect stats from pairings within the bid month
  let totalCredit = 0, pairingCount = 0;
  const seenPairings = new Set();
  for (const [key, day] of Object.entries(calDays)) {
    if (!day.priorBid && day.pairing && !seenPairings.has(day.pairing)) {
      seenPairings.add(day.pairing);
      pairingCount++;
      if (day.totalCredit) {
        const h = parseInt(day.totalCredit.slice(0,2));
        const m = parseInt(day.totalCredit.slice(2));
        totalCredit += h * 60 + m;
      }
    }
  }
  const crH = Math.floor(totalCredit / 60);
  const crM = String(totalCredit % 60).padStart(2,'0');
  const creditStr = `${crH}h${crM}`;

  // Build layover cities per pairing
  const pairingLayovers = {};
  for (const [code, keys] of Object.entries(pairingGroups)) {
    const cities = [];
    for (const k of keys) {
      const d = calDays[k];
      if (d && d.lyovCity) cities.push(d.lyovCity);
    }
    pairingLayovers[code] = cities;
  }

  // Helper: get day object
  function getDay(dayNum) {
    const key = `${bidYear}-${String(bidMonthIdx+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
    return calDays[key] || null;
  }

  // Build calendar cells
  function renderCell(dayNum, isNextMonth = false) {
    const day = getDay(dayNum);

    if (!day) {
      // No data = off
      return `<div class="dc off"><div class="dn">${String(dayNum).padStart(2,'0')}</div><div class="off-lbl">OFF</div></div>`;
    }

    if (day.type === 'off') {
      return `<div class="dc off"><div class="dn">${String(dayNum).padStart(2,'0')}</div><div class="off-lbl">OFF</div></div>`;
    }

    if (day.priorBid) {
      return `<div class="dc prior">
        <div class="dn">${String(dayNum).padStart(2,'0')}</div>
        <div class="prior-stamp">PRIOR BID</div>
        <div class="pcode prior-c">${day.pairing || ''}</div>
        ${day.isFinalDay ? `<div class="trow"><span class="tv rel-prior">REL ${formatTime(day.tdty || '')}</span></div>` : ''}
      </div>`;
    }

    const isPstart = day.type === 'pstart';
    const cls = isPstart ? 'pstart' : 'pcont';
    const pcodeClass = isPstart ? '' : 'cont';

    // Tooltip content
    const legRows = (day.legs || []).map(l => `
      <div class="tt-leg">
        <span class="tt-apt">${l.from}</span>
        <span class="tt-flt">${l.flt}<br><span class="tt-arrow">›</span></span>
        <span class="tt-time">${formatTime(l.dep)}</span>
        <span class="tt-arr-time">${formatTime(l.arr)}</span>
        <span class="tt-apt" style="text-align:right">${l.to}</span>
      </div>`).join('');

    const hotelHTML = day.hotel ? `
      <div class="tt-hotel">
        <div class="tt-hotel-name"><span class="tt-hotel-icon">🏨</span>${day.hotel}</div>
        ${day.hotelPhone ? `<div class="tt-hotel-phone">${day.hotelPhone}</div>` : ''}
      </div>` : '';

    const statsHTML = [
      day.reportTime ? `<div class="tt-row"><span class="tt-label">Report</span><span class="tt-val gold">${formatTime(day.reportTime)}</span></div>` : '',
      day.blkt ? `<div class="tt-row"><span class="tt-label">Block</span><span class="tt-val blue">${fmtHHMM(day.blkt)}</span></div>` : '',
      day.tcrd ? `<div class="tt-row"><span class="tt-label">Credit</span><span class="tt-val green">${fmtHHMM(day.tcrd)}</span></div>` : '',
      day.tdty ? `<div class="tt-row"><span class="tt-label">Duty</span><span class="tt-val">${fmtHHMM(day.tdty)}</span></div>` : '',
      day.lyovCity ? `<div class="tt-row"><span class="tt-label">Layover</span><span class="tt-val blue">${day.lyovCity} (${fmtHHMM(day.lyovTime)})</span></div>` : '',
    ].filter(Boolean).join('');

    const tooltip = `<div class="tooltip">
      <div class="tt-header">
        <div>
          <div class="tt-code">${day.pairing}</div>
          <div class="tt-day">Day ${day.dayOfPairing}</div>
        </div>
      </div>
      ${legRows ? `<div class="tt-legs">${legRows}</div><hr class="tt-divider">` : ''}
      ${statsHTML}
      ${hotelHTML}
    </div>`;

    // Main cell content
    const badge = day.lyovCity ? `<div class="lbadge">${day.lyovCity}</div>` : '';
    const credit = day.isFinalDay && day.tcrd ? `<div class="cred">${fmtHHMM(day.tcrd)} credit</div>` : '';
    const timeRow = isPstart
      ? `<div class="trow"><span class="tv rpt">RPT ${formatTime(day.reportTime)}</span></div>`
      : (day.isFinalDay ? `<div class="trow"><span class="tv rel">REL ${day.tdty ? formatTime(day.tdty) : ''}</span></div>` : '');

    const dayLabel = isNextMonth
      ? `<div class="dn" style="font-size:10px;">${MONTHS[bidMonthIdx === 11 ? 0 : bidMonthIdx+1]} ${dayNum}</div>`
      : `<div class="dn">${String(dayNum).padStart(2,'0')}</div>`;

    return `<div class="dc ${cls}">
      ${dayLabel}
      <div class="pcode ${pcodeClass}">${day.pairing}</div>
      ${timeRow}
      ${badge}
      ${credit}
      ${tooltip}
    </div>`;
  }

  // ── BUILD GRID ──
  let cells = '';

  // Empty cells before month starts
  for (let i = 0; i < firstDOW; i++) {
    cells += `<div class="dc empty"></div>`;
  }

  // Month days
  for (let d = 1; d <= daysInMonth; d++) {
    cells += renderCell(d);
  }

  // Check for next-month bleed days (e.g. Apr 1 on March calendar)
  // These are part of THIS bid and should show normally
  const nextMonthIdx = (bidMonthIdx + 1) % 12;
  const nextYear = nextMonthIdx === 0 ? bidYear + 1 : bidYear;
  for (let d = 1; d <= 7; d++) {
    const key = `${nextYear}-${String(nextMonthIdx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = calDays[key];
    if (day && day.type !== 'off' && !day.priorBid) {
      cells += renderCell(d, true);
    } else {
      break;
    }
  }

  // Fill remaining cells to complete last row
  const totalCells = cells.match(/class="dc/g)?.length || 0;
  const remainder = totalCells % 7;
  if (remainder > 0) {
    for (let i = 0; i < 7 - remainder; i++) {
      cells += `<div class="dc empty"></div>`;
    }
  }

  // ── PAIRING CARDS ──
  let pCards = '';
  const seenForCards = new Set();
  for (const [key, day] of Object.entries(calDays)) {
    if (!day.pairing || seenForCards.has(day.pairing) || day.priorBid) continue;
    seenForCards.add(day.pairing);

    const keys = (pairingGroups[day.pairing] || []).filter(k => {
      const d = calDays[k];
      return d && !d.priorBid;
    });
    keys.sort();
    if (keys.length === 0) continue;

    // Date range
    const firstKey = keys[0];
    const lastKey = keys[keys.length - 1];
    const startDay = parseInt(firstKey.split('-')[2]);
    const endDay = parseInt(lastKey.split('-')[2]);
    const startMo = parseInt(firstKey.split('-')[1]) - 1;
    const endMo = parseInt(lastKey.split('-')[1]) - 1;
    const dateRange = startMo === endMo
      ? `${MONTHS[startMo]} ${startDay} – ${endDay}`
      : `${MONTHS[startMo]} ${startDay} – ${MONTHS[endMo]} ${endDay}`;

    // Route: collect all unique airports
    const allLegs = [];
    for (const k of keys) {
      const d = calDays[k];
      if (d && d.legs) allLegs.push(...d.legs);
    }
    const routeApts = [];
    for (const l of allLegs) {
      if (routeApts.length === 0) routeApts.push(l.from);
      routeApts.push(l.to);
    }
    // Deduplicate consecutive
    const uniqueRoute = routeApts.filter((a, i) => i === 0 || a !== routeApts[i-1]);
    const routeHTML = uniqueRoute.map((a, i) =>
      i < uniqueRoute.length - 1
        ? `<span class="apt">${a}</span><span class="arr">›</span>`
        : `<span class="apt">${a}</span>`
    ).join('');

    const firstDay = calDays[firstKey];
    const lastDay = calDays[lastKey];
    const credit = lastDay?.tcrd ? fmtHHMM(lastDay.tcrd) : '';
    const rpt = firstDay?.reportTime ? formatTime(firstDay.reportTime) : '';
    const rel = lastDay?.tdty ? formatTime(lastDay.tdty) : '';
    const layovers = pairingLayovers[day.pairing] || [];

    pCards += `<div class="pcard">
      <div class="pc-code">${day.pairing}</div>
      <div class="pc-dates">${dateRange} &nbsp;·&nbsp; ${keys.length}-day &nbsp;·&nbsp; ${position}</div>
      <div class="route">${routeHTML}</div>
      <div class="pstats">
        <div class="ps"><div class="ps-l">RPT</div><div class="ps-v">${rpt}</div></div>
        <div class="ps"><div class="ps-l">REL</div><div class="ps-v">${rel}</div></div>
        <div class="ps"><div class="ps-l">Credit</div><div class="ps-v">${credit}</div></div>
      </div>
      <div class="pills">
        ${layovers.length ? `<span class="pill-lay">✈ ${layovers.join(' · ')}</span>` : ''}
        ${credit ? `<span class="pill-cr">${credit}</span>` : ''}
      </div>
    </div>`;
  }

  // ── FINAL HTML ──
  return `
    <header>
      <div>
        <div class="tag">Crew Schedule</div>
        <h1>${monthName.toUpperCase()} <span>${bidYear}</span></h1>
        <div class="sub">${empNum} &nbsp;·&nbsp; ${firstName} ${lastName} &nbsp;·&nbsp; ${base} &nbsp;·&nbsp; ${position}</div>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-l">Pairings</div><div class="stat-v">${pairingCount}</div></div>
        <div class="stat"><div class="stat-l">Trip Credit</div><div class="stat-v">${creditStr}</div></div>
      </div>
    </header>

    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--accent)"></div>Pairing Start</div>
      <div class="leg"><div class="leg-dot" style="background:var(--accent2)"></div>Continuation / Release</div>
      <div class="leg"><div class="leg-dot" style="background:#0e1016;border:1px solid #181c24"></div>Day Off</div>
      <div class="leg"><div class="leg-dot" style="background:#0c0e14;border:1px dashed #252a36"></div>Prior Bid</div>
      <div class="leg" style="font-size:10px;opacity:0.6;">Hover days for flight details</div>
    </div>

    <div class="dow-row">
      <div class="dow">Sun</div><div class="dow">Mon</div><div class="dow">Tue</div>
      <div class="dow">Wed</div><div class="dow">Thu</div><div class="dow">Fri</div><div class="dow">Sat</div>
    </div>

    <div class="cal">${cells}</div>

    <div class="summary">
      <h2>PAIRINGS DETAIL</h2>
      <div class="pcards">${pCards}</div>
    </div>
  `;
}

// ══════════════════════════════════════════
// CLAUDE API — IMAGE → TEXT
// ══════════════════════════════════════════
async function parseImageWithClaude(base64Data, mediaType) {
  setLoaderStep('Analyzing schedule...');

  const prompt = `You are parsing a Sabre CrewTrac "Schedule Detail Report" screenshot for an airline crew member.

Extract the COMPLETE raw text from this image, preserving ALL formatting, spacing, and line breaks EXACTLY as they appear. Do not summarize or interpret — just transcribe every visible character.

The output should look like:
625778 SCHULZ,ZACHARY JOHN SEN# 02550 BID EWR EM7 FO
PERIOD 0326 TIMES ARE IN LOCAL
02 MAR OFF
03 MAR OFF
...
09 MAR R7373 /0309 POS FO DAY 01 REPORT 1614
3654 EWR SAV 1100 1330
...etc

Transcribe EVERYTHING visible. Include hotel names, phone numbers, PAIRING ENDS IN NEXT BID PERIOD notices, all flight legs, all times.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{
        role: 'user',
        content: [
          {
            type: 'image',
            source: { type: 'base64', media_type: mediaType, data: base64Data }
          },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${response.status}`);
  }

  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('\n');
  return text;
}

// ══════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════
function setLoaderStep(msg) {
  const el = document.getElementById('loader-step');
  if (el) el.textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-banner').classList.remove('show');
}

function showLoading() {
  document.getElementById('loading-screen').classList.add('show');
  document.getElementById('upload-screen').style.display = 'none';
}

function hideLoading() {
  document.getElementById('loading-screen').classList.remove('show');
}

function showCalendar(html) {
  const screen = document.getElementById('calendar-screen');
  document.getElementById('calendar-output').innerHTML = html;
  screen.classList.add('show');
  window.scrollTo(0, 0);
}

function resetApp() {
  document.getElementById('calendar-screen').classList.remove('show');
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('file-input').value = '';
  hideError();
  window.scrollTo(0, 0);
}

async function processFile(file) {
  hideError();

  if (!file || !file.type.startsWith('image/')) {
    showError('Please upload an image file (PNG or JPG).');
    return;
  }

  showLoading();
  setLoaderStep('Reading image...');

  try {
    // Convert to base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const mediaType = file.type || 'image/png';

    setLoaderStep('Extracting schedule data...');
    const rawText = await parseImageWithClaude(base64, mediaType);

    setLoaderStep('Building calendar...');
    const parsed = parseSchedule(rawText);

    if (parsed.bidMonthIdx < 0) {
      throw new Error('Could not detect the bid month. Make sure this is a Sabre CrewTrac Schedule Detail Report.');
    }

    const calHTML = renderCalendar(parsed);

    hideLoading();
    showCalendar(calHTML);

  } catch (err) {
    hideLoading();
    document.getElementById('upload-screen').style.display = 'flex';
    showError('Error: ' + (err.message || 'Something went wrong. Please try again.'));
    console.error(err);
  }
}

// ══════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
